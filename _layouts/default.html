<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
</head>
<body>

  <header class="site-header">
    <div class="site-header__inner">
      <a href="{{ '/' | relative_url }}" class="site-logo">
        <span class="site-logo__prefix">jpcodelab /</span>&nbsp;journal
      </a>
      <nav class="site-nav">
        <a href="{{ '/category/personal' | relative_url }}" {% if page.url contains 'personal' %}class="active"{% endif %}>Personal</a>
        <a href="{{ '/category/reflection' | relative_url }}" {% if page.url contains 'reflection' %}class="active"{% endif %}>Reflection</a>
        <a href="{{ '/category/professional' | relative_url }}" {% if page.url contains 'professional' %}class="active"{% endif %}>Professional</a>
        <a href="{{ '/category/archive' | relative_url }}" {% if page.url contains 'archive' %}class="active"{% endif %}>Archive</a>
        <button class="search-btn" onclick="openSearch()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          Search
        </button>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="site-footer__inner">
        <span>© {{ 'now' | date: "%Y" }} José Pedro — jpcodelab/journal</span>
        <span>Built with Jekyll · GitHub Pages</span>
      </div>
    </div>
  </footer>

  <!-- Search Overlay -->
  <div class="search-overlay" id="searchOverlay">
    <div class="search-box">
      <input type="text" class="search-box__input" id="searchInput" placeholder="Search articles..." autocomplete="off">
      <div class="search-results" id="searchResults"></div>
    </div>
    <button class="search-close" onclick="closeSearch()">✕</button>
  </div>

  <script src="{{ '/assets/js/search.js' | relative_url }}"></script>
  <script>
    function openSearch() {
      document.getElementById('searchOverlay').classList.add('open');
      document.getElementById('searchInput').focus();
    }
    function closeSearch() {
      document.getElementById('searchOverlay').classList.remove('open');
    }
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeSearch();
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openSearch(); }
    });
  </script>
</body>
</html>
